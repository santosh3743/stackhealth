name: Deploy

# Push-to-deploy via SSH to a single VM (Oracle Cloud Always Free, or any
# Linux box with Docker). The job is opt-in: it only runs once you've added
# DEPLOY_SSH_KEY, DEPLOY_HOST, and DEPLOY_USER as repo secrets.
#
# Until then this workflow runs the preflight, sees the secrets are missing,
# and exits cleanly without trying to deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  preflight:
    name: Has deploy secrets?
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          if [ -n "$DEPLOY_SSH_KEY" ] && [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy — add DEPLOY_SSH_KEY, DEPLOY_HOST, DEPLOY_USER as repo secrets to enable."
          fi

  vm-deploy:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    concurrency: vm-deploy
    steps:
      - uses: actions/checkout@v6

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '~/stackhealth' }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $DEPLOY_PATH && ./infra/deploy.sh pull"
