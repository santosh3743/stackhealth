name: Deploy

# Fly.io deploys run only when a FLY_API_TOKEN repo secret exists.
# Until then, this workflow is opt-in via manual dispatch.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  preflight:
    name: Has Fly token?
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy — FLY_API_TOKEN secret not configured."
          fi

  deploy-api:
    needs: preflight
    if: needs.preflight.outputs.has_token == 'true'
    runs-on: ubuntu-latest
    concurrency: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config infra/fly.api.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-worker:
    needs: [preflight, deploy-api]
    if: needs.preflight.outputs.has_token == 'true'
    runs-on: ubuntu-latest
    concurrency: deploy-worker
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config infra/fly.worker.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # NOTE: web auto-deploys via Vercel's GitHub integration.
