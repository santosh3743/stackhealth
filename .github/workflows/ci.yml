name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API + worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Tests
        env:
          # Tests don't touch the DB, but Settings requires DATABASE_URL to load.
          DATABASE_URL: postgresql+psycopg://test:test@localhost/test
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest -q

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm reads its version from packageManager in package.json; don't
      # pass `version:` here or pnpm/action-setup errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install (workspace)
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter web typecheck
      - name: Lint
        run: pnpm --filter web lint
      - name: Build
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
