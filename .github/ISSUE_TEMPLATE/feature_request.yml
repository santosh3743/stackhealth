name: ✨ Feature request
description: Suggest a new capability or improvement.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement.

        **Heads up:** if your suggestion involves changing the scoring
        formula (weights, thresholds, new engines), please read
        [Changing the scoring formula](https://github.com/santosh3743/stackhealth/blob/main/CONTRIBUTING.md#changing-the-scoring-formula)
        first — those changes go through a slightly more formal review
        because they affect every existing score.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the user pain point, not the solution. A good problem
        statement makes it easier to compare alternative solutions.
      placeholder: |
        Example: I want to compare my repo's score against the median
        for repos of similar size in the same language, so I know
        whether my 76 is good or bad in context.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you'd like it to work, at the level you'd
        explain it to a teammate.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other approaches you thought about and why this one wins.
        Helps avoid us suggesting them and walking the same loop.
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Does this affect the formula?
      options:
        - label: "Yes — this changes how scores are computed."
        - label: "No — this is purely UI, API ergonomics, or operational."
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, prior art from other tools, related issues, etc.
    validations:
      required: false
