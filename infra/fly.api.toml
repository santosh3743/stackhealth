# Fly.io config for the API process.
# Deploy:  fly deploy --config infra/fly.api.toml

app = "stackhealth-api"
primary_region = "iad"

[build]
  dockerfile = "../infra/Dockerfile"
  build-target = "api"

[env]
  PORT = "8080"
  ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "15s"
  method = "GET"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
