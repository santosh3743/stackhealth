# Production docker-compose for a single-VM deploy.
# Designed for Oracle Cloud Always Free ARM Ampere (or any Linux VM with Docker).
#
# Build & run from repo root:
#   cp infra/.env.prod.example .env
#   # edit .env: DOMAIN, GITHUB_TOKEN, etc.
#   docker compose -f infra/docker-compose.prod.yml --env-file .env up -d --build
#
# See infra/README.md for the full setup walkthrough.

name: stackhealth

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stackhealth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: stackhealth
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stackhealth"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  migrate:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: api
    command: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://stackhealth:${POSTGRES_PASSWORD}@postgres:5432/stackhealth
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://stackhealth:${POSTGRES_PASSWORD}@postgres:5432/stackhealth
      REDIS_URL: redis://redis:6379/0
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CORS_ALLOWED_ORIGINS: https://${DOMAIN:?set DOMAIN in .env}
      SENTRY_DSN: ${SENTRY_DSN:-}
      FORMULA_VERSION: v1.0
      ENV: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://stackhealth:${POSTGRES_PASSWORD}@postgres:5432/stackhealth
      REDIS_URL: redis://redis:6379/0
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      FORMULA_VERSION: v1.0
      LOCAL_ARTIFACT_DIR: /var/artifacts
      ENV: production
      LOG_LEVEL: INFO
    volumes:
      - artifacts:/var/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
        NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
    restart: unless-stopped
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    depends_on:
      - api
      - web
    networks: [internal]

volumes:
  postgres-data:
  redis-data:
  artifacts:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge
