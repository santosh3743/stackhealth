name: "StackHealth Grade"
description: "Score every PR against the StackHealth open-formula code health benchmark. Comments the grade and delta."
author: "Santosh Jha"
branding:
  icon: "activity"
  color: "purple"

inputs:
  email:
    description: "Email for scan-complete notifications. Set this once in repo secrets."
    required: true
  min-grade:
    description: "Fail the check if the PR grade is below this letter grade (e.g. B, A-). Leave empty to never fail."
    required: false
    default: ""
  github-token:
    description: "GITHUB_TOKEN used to post the PR comment."
    required: false
    default: ${{ github.token }}
  api-base:
    description: "Override the StackHealth API base URL (default: https://api.stackhealth.dev)."
    required: false
    default: "https://api.stackhealth.dev"
  site-base:
    description: "Override the site base URL used in comment links."
    required: false
    default: "https://stackhealth.dev"
  ci-token:
    description: "Shared secret sent as the `x-stackhealth-ci` request header so a Cloudflare WAF rule can let CI traffic past bot protection (Actions runners are otherwise 403'd). Optional — set from repo secrets; omit to disable."
    required: false
    default: ""

outputs:
  base-grade:
    description: "Letter grade of the base branch (e.g. B+)."
  head-grade:
    description: "Letter grade of this PR's HEAD."
  base-score:
    description: "Numeric score of the base (0-100)."
  head-score:
    description: "Numeric score of the PR HEAD (0-100)."
  delta:
    description: "head-score minus base-score (negative if the PR regressed)."

runs:
  using: "node20"
  main: "dist/index.js"
